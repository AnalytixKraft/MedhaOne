name: CI

on:
  pull_request:
  push:
    branches: [main, "phase-*"]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API · ruff + pytest
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: medhaone
          POSTGRES_PASSWORD: medhaone
          POSTGRES_DB: medhaone_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U medhaone -d medhaone_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      # A plain postgresql:// URL is consumed as-is by Prisma and auto-rewritten to
      # postgresql+psycopg:// by the API's pydantic settings, so one value serves both.
      DATABASE_URL: postgresql://medhaone:medhaone@localhost:5432/medhaone_test
      # Non-placeholder values so the Settings validators pass outside pytest (e.g. alembic).
      SECRET_KEY: ci-secret-key
      RBAC_JWT_SECRET: ci-rbac-secret
      DEFAULT_ADMIN_PASSWORD: ci-admin-password
    steps:
      - uses: actions/checkout@v4

      # Node/pnpm are needed only to apply the RBAC (public) schema that the API
      # integration tests rely on (public.organizations lives in the shared DB).
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.3
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply RBAC public schema (prisma migrate deploy)
        run: pnpm --filter rbac-api prisma:migrate

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml
      - name: Install API package
        run: pip install -e apps/api

      - name: Lint (ruff)
        working-directory: apps/api
        run: ruff check .

      - name: OpenAPI schema is in sync with the code
        working-directory: apps/api
        run: |
          python scripts/export_openapi.py openapi.json
          git diff --exit-code openapi.json \
            || { echo "::error::openapi.json is stale. Run 'python scripts/export_openapi.py openapi.json' and commit."; exit 1; }

      - name: Migrations have a single head
        working-directory: apps/api
        run: |
          heads="$(alembic heads | grep -c '(head)')"
          echo "alembic heads found: $heads"
          test "$heads" -eq 1

      - name: Tests (pytest)
        working-directory: apps/api
        run: python -m pytest -q

  web:
    name: Web · typecheck + lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.3
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generated API types are in sync with openapi.json
        run: |
          pnpm --filter web openapi:generate
          git diff --exit-code apps/web/lib/api/generated/schema.ts \
            || { echo "::error::Generated API types are stale. Run 'pnpm --filter web openapi:generate' and commit."; exit 1; }
      - name: Typecheck
        run: pnpm --filter web typecheck
      - name: Lint (eslint)
        run: pnpm --filter web lint
      - name: Build
        run: pnpm --filter web build

  rbac:
    name: RBAC · typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.3
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm --filter rbac-api prisma:generate
      - name: Typecheck
        run: pnpm --filter rbac-api lint
      - name: Build
        run: pnpm --filter rbac-api build
